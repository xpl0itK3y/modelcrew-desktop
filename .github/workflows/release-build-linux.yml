name: Build stable Linux bundles

on:
  workflow_call:
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          - label: Linux ARM64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: linux-aarch64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            file \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-pulseaudio \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Linux bundles
        env:
          # Public OAuth App Client ID for GitHub sign-in, injected at build
          # time so it stays out of the source tree. An empty secret just
          # leaves sign-in "not configured" — nothing breaks.
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          # Bundle GStreamer into the AppImage so notification sounds work
          # without the user installing system audio plugins. The deb/rpm
          # declare these as package dependencies instead.
          APPIMAGE_BUNDLE_GSTREAMER: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --ci --target "${{ matrix.target }}" --bundles "appimage,deb,rpm"

      # AppImage несёт свой WebKitGTK, а тот проигрывает звук только через
      # GStreamer. Если в образ попали библиотеки GStreamer, но не попали
      # плагины, звук молча пропадает: пути плагинов у собранного на Ubuntu
      # ядра указывают в /usr/lib/x86_64-linux-gnu/gstreamer-1.0, которого на
      # других дистрибутивах нет. Ловим это здесь, а не в отзывах.
      - name: Check the AppImage audio stack
        run: |
          set -euo pipefail
          bundle="src-tauri/target/${{ matrix.target }}/release/bundle/appimage"
          appimage="$(find "$bundle" -name '*.AppImage' -print -quit)"
          test -n "$appimage" || { echo "No AppImage in $bundle" >&2; exit 1; }
          work="$(mktemp -d)"
          cp "$appimage" "$work/app.AppImage"
          chmod +x "$work/app.AppImage"
          # --appimage-extract разворачивает образ без FUSE.
          (cd "$work" && ./app.AppImage --appimage-extract >/dev/null)
          root="$work/squashfs-root"
          core="$(find "$root" -name 'libgstreamer-1.0.so*' -print -quit || true)"
          plugins="$(find "$root" -type d -name 'gstreamer-1.0' -print -quit || true)"
          if [ -n "$core" ] && [ -z "$plugins" ]; then
            echo "AppImage ships GStreamer libraries without any plugins:" >&2
            echo "  core:    $core" >&2
            echo "  plugins: (none)" >&2
            echo "Notification sounds would be silent on every machine." >&2
            exit 1
          fi
          if [ -n "$plugins" ]; then
            echo "GStreamer plugins bundled: $(find "$plugins" -name '*.so' | wc -l)"
          else
            echo "No bundled GStreamer: the system one will be used."
          fi

      - name: Upload signed Linux bundles
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stable-${{ matrix.artifact }}
          retention-days: 7
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
