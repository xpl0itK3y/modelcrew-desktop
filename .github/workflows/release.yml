name: Stable release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    permissions:
      contents: write
    uses: ./.github/workflows/release-prepare.yml
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  windows:
    name: Build Windows
    needs: prepare
    uses: ./.github/workflows/release-build-windows.yml
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  macos:
    name: Build macOS
    needs: prepare
    uses: ./.github/workflows/release-build-macos.yml
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  linux:
    name: Build Linux
    needs: prepare
    uses: ./.github/workflows/release-build-linux.yml
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  arch:
    name: Package Arch Linux
    needs:
      - prepare
      - linux
    uses: ./.github/workflows/release-build-arch.yml

  finalize:
    name: Publish release
    needs:
      - prepare
      - windows
      - macos
      - linux
      - arch
    permissions:
      contents: write
    uses: ./.github/workflows/release-finalize.yml
    with:
      release-id: ${{ needs.prepare.outputs.release-id }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  publish-aur:
    name: Publish AUR metadata
    if: ${{ vars.AUR_ENABLED == 'true' }}
    needs:
      - prepare
      - finalize
    uses: ./.github/workflows/release-publish-aur.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
