name: Prepare stable release

on:
  workflow_call:
    outputs:
      release-id:
        description: Draft GitHub Release identifier
        value: ${{ jobs.prepare.outputs.release-id }}
      version:
        description: Validated application version
        value: ${{ jobs.prepare.outputs.version }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  prepare:
    name: Validate and create draft release
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.draft.outputs.release_id }}
      version: ${{ steps.metadata.outputs.version }}
    env:
      RELEASE_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Check required signing secrets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

      - name: Check repository is public
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh api "repos/$RELEASE_REPOSITORY" --jq .private)" = "false"

      - name: Read version and previous public release
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")"
          latest_tag="$(gh api "repos/$RELEASE_REPOSITORY/releases/latest" --jq .tag_name 2>/dev/null || true)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata and monotonic version
        run: >-
          node scripts/release/validate-release.mjs
          --tag "${{ github.ref_name }}"
          --latest-tag "${{ steps.metadata.outputs.latest_tag }}"

      - name: Require tagged commit to be in main
        run: |
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Generate localized release body
        run: >-
          node scripts/release/release-body.mjs
          --version "${{ steps.metadata.outputs.version }}"
          --output release-work/RELEASE_BODY.md
          --aur-enabled "${{ vars.AUR_ENABLED || 'false' }}"

      - name: Create or refresh draft release
        id: draft
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          existing="$(gh api "repos/$RELEASE_REPOSITORY/releases/tags/$TAG" 2>/dev/null || true)"
          if test -n "$existing"; then
            if test "$(jq -r .draft <<<"$existing")" != "true"; then
              if test "$(jq -r .prerelease <<<"$existing")" != "true"; then
                echo "A stable published release already exists for $TAG" >&2
                exit 1
              fi
              echo "Recovering an interrupted prerelease for $TAG as a draft"
            fi
            release_id="$(jq -r .id <<<"$existing")"
            gh api --method PATCH "repos/$RELEASE_REPOSITORY/releases/$release_id" \
              --raw-field name="ModelCrew v$VERSION" \
              --raw-field body="$(cat release-work/RELEASE_BODY.md)" \
              -F draft=true \
              -F prerelease=false \
              --raw-field make_latest=false >/dev/null
          else
            created="$(gh api --method POST "repos/$RELEASE_REPOSITORY/releases" \
              --raw-field tag_name="$TAG" \
              --raw-field name="ModelCrew v$VERSION" \
              --raw-field body="$(cat release-work/RELEASE_BODY.md)" \
              -F draft=true \
              -F prerelease=false)"
            release_id="$(jq -r .id <<<"$created")"
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
