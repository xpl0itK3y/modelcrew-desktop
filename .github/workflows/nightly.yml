name: Nightly installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Validate nightly inputs
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate version and release notes
        run: node scripts/release/validate-release.mjs

      - name: Require updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY"
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

  build:
    name: ${{ matrix.label }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x64
            artifact: windows-x64
            bundles: nsis,msi
          - label: macOS Apple Silicon
            os: macos-15
            target: aarch64-apple-darwin
            platform: macos
            arch: aarch64
            artifact: macos-aarch64
            bundles: app,dmg
          - label: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
            arch: x86_64
            artifact: macos-x86_64
            bundles: app,dmg
          - label: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x86_64
            artifact: linux-x86_64
            bundles: appimage,deb,rpm
          - label: Linux ARM64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: aarch64
            artifact: linux-aarch64
            bundles: appimage,deb,rpm
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            file \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-pulseaudio \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build macOS bundles with ad-hoc signing
        if: runner.os == 'macOS'
        env:
          # Public OAuth App Client ID for GitHub sign-in (empty → not
          # configured); kept in a secret so it stays out of the repo.
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --ci --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}"

      - name: Build Windows or Linux bundles
        if: runner.os != 'macOS'
        env:
          # Public OAuth App Client ID for GitHub sign-in (empty → not
          # configured); kept in a secret so it stays out of the repo.
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --ci --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}"

      # AppImage несёт свой WebKitGTK, а тот проигрывает звук только через
      # GStreamer. Библиотеки GStreamer попадают в образ сами — они прописаны в
      # зависимостях libwebkit2gtk и копируются вместе с ним. А вот плагины
      # (парсер WAV, преобразование, вывод в ALSA/Pulse) лежат отдельным
      # каталогом, и без них пайплайн не собирается: звука нет вообще.
      # Кладём их сами и подсказываем GStreamer путь через apprun-хук —
      # собранное на Ubuntu ядро иначе ищет плагины в
      # /usr/lib/x86_64-linux-gnu/gstreamer-1.0, которого на других
      # дистрибутивах не существует.
      - name: Bundle GStreamer plugins into the AppImage
        if: contains(matrix.bundles, 'appimage')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          bundle="src-tauri/target/${{ matrix.target }}/release/bundle/appimage"
          appimage="$(find "$bundle" -name '*.AppImage' -print -quit)"
          test -n "$appimage" || { echo "No AppImage in $bundle" >&2; exit 1; }
          appimage="$(realpath "$appimage")"

          multiarch="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          plugins="/usr/lib/$multiarch/gstreamer-1.0"
          test -d "$plugins" || { echo "No GStreamer plugins at $plugins" >&2; exit 1; }
          scanner="$(find /usr/lib/"$multiarch" -name gst-plugin-scanner -print -quit)"
          test -n "$scanner" || { echo "gst-plugin-scanner not found" >&2; exit 1; }
          # Инструмент упаковки уже скачал сам tauri во время сборки.
          tool="$(find "$HOME/.cache/tauri" -name 'appimagetool*' -print -quit)"
          test -n "$tool" || { echo "appimagetool not found in tauri cache" >&2; exit 1; }
          chmod +x "$tool"

          work="$(mktemp -d)"
          (cd "$work" && "$appimage" --appimage-extract >/dev/null)
          root="$work/squashfs-root"
          install -d "$root/usr/lib/gstreamer-1.0"
          cp -a "$plugins"/*.so "$root/usr/lib/gstreamer-1.0/"
          cp -a "$scanner" "$root/usr/lib/gstreamer-1.0/"
          # AppRun выполняет каждый файл из apprun-hooks перед запуском.
          cat > "$root/apprun-hooks/gstreamer.sh" <<'HOOK'
          export GST_PLUGIN_SYSTEM_PATH_1_0="$APPDIR/usr/lib/gstreamer-1.0"
          export GST_PLUGIN_SCANNER="$APPDIR/usr/lib/gstreamer-1.0/gst-plugin-scanner"
          # Свой файл реестра: общий с системным GStreamer описывал бы совсем
          # другой набор плагинов, и наши считались бы неизвестными.
          mkdir -p "${XDG_CACHE_HOME:-$HOME/.cache}/modelcrew"
          export GST_REGISTRY_1_0="${XDG_CACHE_HOME:-$HOME/.cache}/modelcrew/gstreamer-registry.bin"
          HOOK
          ARCH="$(uname -m)" "$tool" --no-appstream "$root" "$appimage"
          chmod +x "$appimage"

          # Патч меняет байты образа, поэтому прежняя подпись к нему уже не
          # относится: пересоздаём её тем же ключом.
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            npm run --silent tauri -- signer sign \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
              "$appimage" > /dev/null
          fi

      # Ловим регресс здесь, а не в отзывах пользователей.
      - name: Check the AppImage audio stack
        if: contains(matrix.bundles, 'appimage')
        run: |
          set -euo pipefail
          bundle="src-tauri/target/${{ matrix.target }}/release/bundle/appimage"
          appimage="$(find "$bundle" -name '*.AppImage' -print -quit)"
          test -n "$appimage" || { echo "No AppImage in $bundle" >&2; exit 1; }
          work="$(mktemp -d)"
          cp "$appimage" "$work/app.AppImage"
          chmod +x "$work/app.AppImage"
          # --appimage-extract разворачивает образ без FUSE.
          (cd "$work" && ./app.AppImage --appimage-extract >/dev/null)
          root="$work/squashfs-root"
          core="$(find "$root" -name 'libgstreamer-1.0.so*' -print -quit || true)"
          plugins="$(find "$root" -type d -name 'gstreamer-1.0' -print -quit || true)"
          if [ -n "$core" ] && [ -z "$plugins" ]; then
            echo "AppImage ships GStreamer libraries without any plugins:" >&2
            echo "  core:    $core" >&2
            echo "  plugins: (none)" >&2
            echo "Notification sounds would be silent on every machine." >&2
            exit 1
          fi
          if [ -n "$plugins" ]; then
            echo "GStreamer plugins bundled: $(find "$plugins" -name '*.so' | wc -l)"
          else
            echo "No bundled GStreamer: the system one will be used."
          fi

      - name: Create build metadata
        id: metadata
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          node scripts/release/build-info.mjs \
            --output release-work/BUILD_INFO.json \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}"

      - name: Upload nightly installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-${{ matrix.artifact }}-${{ steps.metadata.outputs.short_sha }}
          retention-days: 14
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            release-work/BUILD_INFO.json

  build-arch:
    name: Arch Linux ${{ matrix.arch }}
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    container: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
    steps:
      # nodejs is required for the artifact actions that run inside the container.
      - name: Install packaging tools
        run: pacman -Syu --needed --noconfirm base-devel nodejs

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Download Linux deb
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nightly-linux-${{ matrix.arch }}-${{ steps.sha.outputs.short_sha }}
          path: deb-input

      - name: Repackage deb into a pacman package
        env:
          PKG_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          deb="$(find deb-input -name '*.deb' -print -quit)"
          test -n "$deb" || { echo "No .deb found for ${{ matrix.arch }}" >&2; exit 1; }
          pkgver="$(basename "$deb" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
          test -n "$pkgver" || { echo "Could not derive version from $deb" >&2; exit 1; }
          useradd -m builder
          work=/home/builder/work
          install -d -o builder -g builder "$work"
          install -o builder -g builder "$deb" "$work/modelcrew.deb"
          # Only a prebuilt .deb is unpacked (no compilation), so CARCH just
          # labels the package for the target architecture.
          sed -i "s/^CARCH=.*/CARCH=\"$PKG_ARCH\"/" /etc/makepkg.conf
          cat > "$work/PKGBUILD" <<'PKGBUILD'
          pkgname=modelcrew-bin
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc='Desktop workspace for projects, sessions, and multiple terminals'
          arch=('__ARCH__')
          url='https://github.com/xpl0itK3y/modelcrew-desktop'
          license=('MIT')
          depends=('cairo' 'desktop-file-utils' 'gdk-pixbuf2' 'glib2' 'gst-plugins-good' 'gtk3' 'hicolor-icon-theme' 'libayatana-appindicator' 'libsoup3' 'openssl' 'pango' 'polkit' 'webkit2gtk-4.1')
          provides=('modelcrew')
          conflicts=('modelcrew')
          options=('!strip')
          source=('modelcrew.deb')
          sha256sums=('SKIP')
          package() {
          cd "$srcdir"
          ar x modelcrew.deb
          bsdtar -xf data.tar.* -C "$pkgdir"
          }
          PKGBUILD
          sed -i "s/__VERSION__/$pkgver/; s/__ARCH__/$PKG_ARCH/" "$work/PKGBUILD"
          chown builder:builder "$work/PKGBUILD"
          su builder -c "cd '$work' && makepkg -f --nodeps --clean"
          mkdir -p arch-out
          cp "$work"/*.pkg.tar.zst arch-out/

      - name: Upload Arch package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-arch-${{ matrix.arch }}-${{ steps.sha.outputs.short_sha }}
          retention-days: 14
          if-no-files-found: error
          path: arch-out/*.pkg.tar.zst
