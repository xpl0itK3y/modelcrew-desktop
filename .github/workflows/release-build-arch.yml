name: Package stable Arch Linux bundles

on:
  workflow_call:
    secrets:
      GH_OAUTH_CLIENT_ID:
        required: false
  # Нативная сборка иначе проверялась бы только выпуском релиза, а её поломка
  # ломала бы сам релиз. Ручной запуск даёт прогнать её отдельно и заранее.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Arch обновляет WebKitGTK заметно раньше Ubuntu, а собранный на Ubuntu
  # бинарь запускается уже против этих новых библиотек. Расхождение проявляется
  # не отказом загрузки, а чёрным окном, поэтому пакет собираем прямо на Arch —
  # теми же библиотеками, с которыми он потом работает.
  native:
    name: Arch Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    # У Arch Linux нет собственной сборки под ARM: этим занимается отдельный
    # проект Arch Linux ARM, официального образа для CI у него нет. Берём самый
    # живой из сообщества и закрепляем по digest — так же, как закреплены
    # actions, иначе содержимое образа могло бы поменяться под нами.
    container: ${{ matrix.container }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-22.04
            container: archlinux:latest
          - arch: aarch64
            os: ubuntu-22.04-arm
            container: menci/archlinuxarm@sha256:641e64b81b66794ef1c6bfdc68c38503fb7c32fd4f0d346a876b42803232fc7b
    steps:
      # pacman 7 качает пакеты в песочнице на Landlock и без неё отказывается
      # работать вовсе. Внутри контейнера на раннере применить её ядро не даёт
      # («switching to sandbox user 'alpm' failed»), и всё падает ещё на
      # синхронизации баз. Правим конфиг, а не команду: pacman вызывается ещё
      # и из build-arch-package.sh, флаг на одной команде дыру бы не закрыл.
      - name: Let pacman work without the Landlock sandbox
        run: |
          set -euo pipefail
          pacman --version | grep -i 'pacman v'
          # Директива действует только в секции [options]. Дописанная в конец
          # файла, она попадает в последнюю секцию репозитория (в этом образе
          # это [aur]) и молча игнорируется — pacman сообщает об этом лишь
          # warning-ом, а падает всё так же на песочнице.
          sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
          grep -qx 'DisableSandbox' /etc/pacman.conf
          # Убеждаемся, что pacman директиву принял: незнакомую он бы
          # отбросил тем же warning-ом, и мы снова узнали бы об этом только
          # из упавшей сборки.
          if pacman --version 2>&1 | grep -qi 'not recognized'; then
            echo "pacman не понимает DisableSandbox" >&2
            exit 1
          fi

      - name: Install build dependencies
        run: |
          pacman -Syu --needed --noconfirm \
            base-devel \
            git \
            gst-plugins-base \
            gst-plugins-good \
            gtk3 \
            libayatana-appindicator \
            librsvg \
            libsoup3 \
            nodejs \
            npm \
            openssl \
            rust \
            webkit2gtk-4.1

      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build the pacman package
        env:
          # Public OAuth App Client ID for GitHub sign-in, injected at build
          # time so it stays out of the source tree. An empty secret just
          # leaves sign-in "not configured" — nothing breaks.
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
        run: scripts/ci/build-arch-package.sh "${{ matrix.arch }}"

      - name: Upload Arch package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stable-arch-${{ matrix.arch }}
          retention-days: 7
          if-no-files-found: error
          path: arch-out/*.pkg.tar.zst
