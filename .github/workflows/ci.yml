name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Frontend, Rust, and release metadata
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Test frontend
        run: npm test

      - name: Test Rust backend
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Test release tooling and metadata
        run: |
          npm run release-scripts:test
          npm run release-notes:validate
          npm run changelog:validate
          npm run release:validate

      - name: Validate GitHub Actions workflows
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          "$(go env GOPATH)/bin/actionlint" -color

  # Rust-часть трогает файловую систему и вызывает git, а это ровно то, что
  # ведёт себя по-разному на разных ОС: разделители путей, переводы строк,
  # права доступа. Гоняем её и там, где живут пользователи, а не только на
  # раннере сборки. Фронтенд собирать не нужно: в тестовом профиле окно берёт
  # адрес dev-сервера и вшитые файлы не требуются.
  backend:
    name: Rust backend on ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
          - label: macOS
            os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable

      # Без кеша каждая сборка заново компилирует весь tauri — на Windows это
      # самая долгая часть прогона.
      - name: Cache Rust build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-

      - name: Test Rust backend
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
