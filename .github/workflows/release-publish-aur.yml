name: Publish stable AUR metadata

on:
  workflow_call:
    inputs:
      version:
        description: Published application version
        required: true
        type: string
    secrets:
      AUR_SSH_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish modelcrew-bin to AUR
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download generated AUR metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: aur-metadata-${{ inputs.version }}
          path: aur-metadata

      - name: Publish AUR package metadata
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          VERSION: ${{ inputs.version }}
        run: |
          test -n "$AUR_SSH_PRIVATE_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          expected_host_fingerprint='SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4'
          actual_host_fingerprint="$(ssh-keygen -lf packaging/aur/aur.archlinux.org_known_hosts -E sha256 | awk '{print $2}')"
          test "$actual_host_fingerprint" = "$expected_host_fingerprint"
          install -m 600 packaging/aur/aur.archlinux.org_known_hosts ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            HostKeyAlgorithms ssh-ed25519
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
            GlobalKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config
          git clone ssh://aur@aur.archlinux.org/modelcrew-bin.git aur-package
          cp aur-metadata/PKGBUILD aur-package/PKGBUILD
          cp aur-metadata/.SRCINFO aur-package/.SRCINFO
          git -C aur-package config user.name "ModelCrew Release Bot"
          git -C aur-package config user.email "releases@modelcrew.app"
          git -C aur-package add PKGBUILD .SRCINFO
          if ! git -C aur-package diff --cached --quiet; then
            git -C aur-package commit -m "Update modelcrew-bin to $VERSION"
            git -C aur-package push origin master
          fi
